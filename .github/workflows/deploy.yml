name: HubSpot deployment

on:
  push:
    branches:
      - main  # Matches the branch from your latest update

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install HubSpot CLI Action
        uses: HubSpot/hubspot-project-actions/install-hubspot-cli@v1.0.0

      - name: HubSpot Project Upload
        uses: HubSpot/hubspot-project-actions/project-upload@v1.0.0
        with:
          project_dir: "./app"
          # Passing them as direct action arguments ensures the runner catches them!
          account_id: ${{ secrets.HS_ACCOUNT_ID }}
          personal_access_key: ${{ secrets.HS_PORTAL_AUTH_TOKEN }}