name: HubSpot deployment

on:
  push:
    branches:
      - main

jobs:
  hubspot-deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./app

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install HubSpot CLI
      run: npm install -g @hubspot/cli

    - name: Upload Project Changes
      # We inject the authentication details directly into the execution environment here
      env:
        HUBSPOT_PORTAL_ID: ${{ secrets.HS_ACCOUNT_ID }}
        HUBSPOT_ACCESS_TOKEN: ${{ secrets.HS_PORTAL_AUTH_TOKEN }}
      run: hs project upload